name: seal-build

on:
  push:
  workflow_dispatch:

jobs:
  build-module-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build create_mod helper
        run: |
          set -euo pipefail
          HELPER="$RUNNER_TEMP/helper"
          mkdir -p "$HELPER"
          cp "$GITHUB_WORKSPACE/.github/create_mod.go" "$HELPER/create_mod.go"
          cd "$HELPER"
          go mod init example.com/mod
          go get golang.org/x/mod@v0.24.0
          go build -o "$RUNNER_TEMP/create_mod" ./create_mod.go

      - name: Package module zip
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          # x/mod zip.CreateFromDir descends into .github; upstream ships no
          # .github dir, so remove it before packaging (keep .gitignore /
          # .gitattributes which ARE in the public proxy zip). The helper
          # binary is already built, so removing the source is safe.
          rm -rf "$GITHUB_WORKSPACE/.github"
          "$RUNNER_TEMP/create_mod" golang.org/x/net v0.45.0 "$GITHUB_WORKSPACE" "$RUNNER_TEMP/out/v0.45.0.zip"
          ls -l "$RUNNER_TEMP/out"

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: v0.45.0.zip
          path: ${{ runner.temp }}/out/v0.45.0.zip
          if-no-files-found: error

      - name: Build and test
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          go build ./...
          go test ./...
